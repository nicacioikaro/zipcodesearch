spring:
  application:
    name: zipcodesearch
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/zipcode_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

resilience4j:
  retry:
    instances:
      viacep:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - net.minddevelopment.zipcodesearch.integration.cep.exception.ProviderException
        ignore-exceptions:
          - net.minddevelopment.zipcodesearch.shared.exception.ZipcodeNotFound
  circuitbreaker:
    instances:
      viacep:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - net.minddevelopment.zipcodesearch.integration.cep.exception.ProviderException
        ignore-exceptions:
          - net.minddevelopment.zipcodesearch.shared.exception.ZipcodeNotFound

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always