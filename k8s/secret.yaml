# secret.yaml
# Sensitive values. This is a TEMPLATE — do NOT commit real passwords.
# In production, prefer a real secrets manager (Sealed Secrets, External Secrets,
# Vault, or your cloud provider's secret store) instead of a plain Secret in git.
#
# The value below is base64-encoded (Kubernetes Secret convention), NOT encrypted.
# base64 is encoding, not security — anyone can decode it. It only avoids accidental
# shoulder-surfing; real protection comes from RBAC + a secrets manager.
#
# To generate a base64 value:  echo -n 'your-password' | base64
apiVersion: v1
kind: Secret
metadata:
  name: zipcodesearch-secret
  labels:
    app: zipcodesearch
type: Opaque
data:
  # echo -n 'postgres' | base64  ->  cG9zdGdyZXM=   (CHANGE THIS for production)
  SPRING_DATASOURCE_PASSWORD: cG9zdGdyZXM=
