# servicemonitor.yaml
# The idiomatic way to tell a Prometheus Operator (installed via kube-prometheus-stack)
# to scrape this app. The Operator watches for ServiceMonitor objects and configures
# Prometheus automatically — no manual scrape_config editing.
#
# Requires: the Prometheus Operator CRDs (installed by kube-prometheus-stack via Helm).
# If you don't use the Operator, rely on the pod annotations in deployment.yaml instead.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zipcodesearch
  labels:
    app: zipcodesearch
    # This label must match the Prometheus Operator's serviceMonitorSelector.
    # kube-prometheus-stack commonly selects on 'release: <helm-release-name>'.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: zipcodesearch          # selects the Service named 'zipcodesearch'
  endpoints:
    - port: http                  # matches the named port in service.yaml
      path: /actuator/prometheus
      interval: 15s
